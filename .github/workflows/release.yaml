name: Build and Deploy on Tag

on:
  push:
    tags:
      - 'v*'  # Срабатывает на теги, начинающиеся с 'v' (v1.0.0, v2.1.3, etc.)

jobs:
  build-and-deploy:
    # Указываем, что задача выполняется на вашем self-hosted раннере
    runs-on: [self-hosted, linux, X64]  # или просто [self-hosted]
    
    # Ограничиваем права для безопасности
    permissions:
      contents: read
      packages: write
    
    steps:
      # 1. Клонируем репозиторий с кодом
      - name: Checkout code
        uses: actions/checkout@v4
      
      # 2. Устанавливаем Node.js (если еще не установлен на NAS)
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
      
      # 3. Устанавливаем зависимости
      - name: Install dependencies
        run: |
          npm install
          npm ci

      # 3.1. Проверяем совместимость версий Node.js
      - name: Check Node.js version compatibility
        run: |
          echo "Running on Node.js $(node -v)"
          npm --version
          # Проверяем, что все зависимости совместимы
          npm ls --depth=0 || true
      
      # 4. Собираем приложение
      - name: Build project
        run: |
          export VITE_APP_SUPABASE_URL="${{ secrets.SUPABASE_URL }}"
          export VITE_APP_SUPABASE_ANON_KEY="${{ secrets.SUPABASE_KEY }}"
          export VITE_REACT_APP_TINYBIRD_HOST="${{ secrets.TINYBIRD_HOST }}"
          export VITE_REACT_APP_TINYBIRD_APPEND_TOKEN="${{ secrets.TINYBIRD_APPEND_TOKEN }}"
          npm run build
          # Проверяем, что сборка прошла успешно
          ls -la dist/
      
      # 5. Останавливаем старый контейнер (если есть)
      - name: Stop old container
        run: |
          docker stop jeo-pardy-app || true
          docker rm jeo-pardy-app || true
      
      # 6. Собираем новый Docker-образ
      - name: Build Docker image
        run: |
          docker build -t jeo-pardy-app:latest .
      
      # 7. Запускаем новый контейнер
      - name: Run new container
        run: |
          docker run -d \
            --name jeo-pardy-app \
            --restart always \
            -p 8082:80 \
            jeo-pardy-app:latest
      
      # 8. Проверяем, что приложение работает
      - name: Health check
        run: |
          sleep 5
          curl -f ${{ secrets.NAS_APP_URL }} || exit 1
          echo "✅ Application deployed successfully!"