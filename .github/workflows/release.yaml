name: Build and Deploy on Tag

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
      
      - name: Install dependencies
        run: npm install
      
      - name: Build project
        run: npm run build
      
      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
  
  deploy-to-nas:
    needs: build  # Ждем успешной сборки
    runs-on: ubuntu-latest
    steps:
      - name: Download built artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      
      - name: Deploy to Synology NAS via rsync
        uses: burnett01/rsync-deployments@5.1
        with:
          switches: -avzr --delete
          path: dist/
          remote_path: /volume1/web/jeo-pardy/
          remote_host: ${{ secrets.NAS_HOST }}
          remote_user: ${{ secrets.NAS_USER }}
          remote_key: ${{ secrets.NAS_SSH_KEY }}